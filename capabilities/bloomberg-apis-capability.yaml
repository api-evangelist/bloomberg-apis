          type: object
          value: $.
    - name: refdata-beqsrequest
      path: /refdata/BeqsRequest
      operations:
      - name: beqsrequest
        method: POST
        description: Request data for a Bloomberg Equity Screening (EQS) screen
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mktdata-subscribe
      path: /mktdata/subscribe
